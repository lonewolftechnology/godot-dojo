name: Reusable GDExtension Build

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      arch:
        required: true
        type: string
      rust_target:
        required: true
        type: string
      precision:
        required: true
        type: string
      platform_id:
        required: true
        type: string
      build_target:
        required: true
        type: string # 'editor' or 'templates'
      macos_deployment_target:
        required: false
        type: string
        default: ""
      current_tag:
        required: false
        type: string
        default: ''
      previous_tag:
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build ${{ inputs.platform_id }}-${{ inputs.arch }}-${{ inputs.precision }}-${{ inputs.build_target }}
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: generated-bindings
          path: bindings/

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          PACKAGES="scons build-essential pkg-config dbus libdbus-1-dev protobuf-compiler libprotobuf-dev"
          if [ "${{ inputs.platform_id }}" = "windows-gnu" ]; then PACKAGES="$PACKAGES mingw-w64"; fi
          sudo apt-get install -y $PACKAGES

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc

      - name: Install Android NDK
        if: inputs.platform_id == 'android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r23c
          add-to-path: true

      - name: Configure Cargo for Android
        if: inputs.platform_id == 'android'
        shell: bash
        run: |
          NDK_TOOLCHAIN_PATH="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "PATH=$NDK_TOOLCHAIN_PATH:$PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=aarch64-linux-android29-clang" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=aarch64-linux-android29-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=aarch64-linux-android29-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=llvm-ar" >> $GITHUB_ENV

      - name: Download core artifacts (target)
        uses: actions/download-artifact@v4
        with:
          name: core-build-${{ inputs.platform_id }}${{ inputs.platform_id == 'ios' && '-universal' || format('-{0}-release', inputs.arch) }}
          path: godot-dojo-core/target

      - name: Cache SCons and godot-cpp build artifacts
        uses: actions/cache@v3
        with:
          path: | # Note: These paths are relative to the checkout directory
            .sconsign.dblite
            demo/addons/godot-dojo/
            external/godot-cpp/bin/
            external/godot-cpp/.sconsign.dblite
            external/godot-cpp/gen/
            external/godot-cpp/__pycache__/
          key: ${{ runner.os }}-${{ inputs.arch }}-scons-${{ inputs.precision }}-${{ inputs.build_target }}-${{ inputs.current_tag }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.arch }}-scons-${{ inputs.precision }}-${{ inputs.build_target }}-${{ inputs.previous_tag }}

      - name: Build GDExtension
        shell: bash
        run: |
          set -e

          export FORCE_RUST_RELEASE=1
          export SKIP_RUST_BUILD=1
          export SKIP_BINDINGS_GENERATION=1
          export CARGO_BUILD_TARGET=${{ inputs.rust_target }}
          
          if [ "${{ runner.os }}" = "macOS" ] && [ -n "${{ inputs.macos_deployment_target }}" ]; then
            export MACOSX_DEPLOYMENT_TARGET=${{ inputs.macos_deployment_target }}
            export RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }-C link-arg=-mmacosx-version-min=${{ inputs.macos_deployment_target }}"
          fi

          mkdir -p demo/addons/godot-dojo
          
          # Non-iOS builds
          if [ "${{ inputs.platform_id }}" != "ios" ]; then
            # For windows-gnu, the platform for SCons is 'windows'
            SCONS_PLATFORM=${{ inputs.platform_id == 'windows-gnu' && 'windows' || inputs.platform_id }}
            PLATFORM_ARG="platform=${SCONS_PLATFORM}"
            ARCH_ARG="arch=${{ inputs.arch }}"
            PRECISION_ARG="precision=${{ inputs.precision }}"
            EXTRA_ARGS=${{ inputs.platform_id == 'windows-gnu' && 'use_mingw=true' || '' }}
            if [ "${{ inputs.build_target }}" = "templates" ]; then
              scons $PLATFORM_ARG $ARCH_ARG target=template_debug $PRECISION_ARG $EXTRA_ARGS -j2
              scons $PLATFORM_ARG $ARCH_ARG target=template_release $PRECISION_ARG $EXTRA_ARGS -j2
            else
              scons $PLATFORM_ARG $ARCH_ARG target=${{ inputs.build_target }} $PRECISION_ARG $EXTRA_ARGS -j2
            fi
          fi

      - name: Build for iOS Device (arm64)
        if: inputs.platform_id == 'ios'
        run: |
          scons platform=ios arch=arm64 target=template_debug precision=${{ inputs.precision }} -j2
          scons platform=ios arch=arm64 target=template_release precision=${{ inputs.precision }} -j2

      - name: Build for iOS Simulator (arm64)
        if: inputs.platform_id == 'ios'
        run: |
          scons platform=ios arch=arm64 ios_simulator=yes target=template_debug precision=${{ inputs.precision }} -j2
          scons platform=ios arch=arm64 ios_simulator=yes target=template_release precision=${{ inputs.precision }} -j2

      - name: Build for iOS Simulator (x86_64)
        if: inputs.platform_id == 'ios'
        run: |
          scons platform=ios arch=x86_64 ios_simulator=yes target=template_debug precision=${{ inputs.precision }} -j2
          scons platform=ios arch=x86_64 ios_simulator=yes target=template_release precision=${{ inputs.precision }} -j2

      - name: Assemble iOS XCFrameworks
        if: inputs.platform_id == 'ios'
        run: |
          scons platform=ios arch=universal assemble-ios target=template_debug precision=${{ inputs.precision }}
          scons platform=ios arch=universal assemble-ios target=template_release precision=${{ inputs.precision }}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ inputs.precision }}-${{ inputs.platform_id }}-${{ inputs.arch }}-${{ inputs.build_target }}
          path: |
            ${{ inputs.platform_id == 'ios' && 'build/' || 'demo/addons/godot-dojo/' }}${{ inputs.platform_id == 'windows-gnu' && format('\ngodot-dojo-core/target/{0}/release/dojo_c.dll', inputs.rust_target) || '' }}
          if-no-files-found: error
